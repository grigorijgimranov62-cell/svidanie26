<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Приглашение на свидание 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ffe6f0, #ffb7c5);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            background: rgba(255,255,255,0.96);
            border-radius: 48px;
            max-width: 500px;
            width: 100%;
            padding: 30px 24px 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(255,80,120,0.3);
        }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hearts { font-size: 56px; margin-bottom: 12px; }
        h1 { font-size: 28px; color: #c43a6b; margin-bottom: 30px; }
        h2 { font-size: 24px; color: #c43a6b; margin-bottom: 20px; }
        .button-group { display: flex; justify-content: center; gap: 25px; margin: 20px 0; position: relative; min-height: 80px; flex-wrap: wrap; }
        .btn { border: none; font-size: 26px; font-weight: bold; padding: 16px 40px; border-radius: 60px; cursor: pointer; }
        .btn-yes { background: #ff80a5; color: white; box-shadow: 0 5px 0 #b43b5e; }
        .btn-yes:active { transform: translateY(2px); }
        .btn-no { background: #d4d4d4; color: #a55b6e; box-shadow: 0 5px 0 #b0a0a5; position: relative; }
        .picker-area { background: #fff5f7; border-radius: 40px; padding: 20px; margin: 15px 0; }
        .picker-row { margin: 20px 0; }
        .picker-row label { display: block; font-size: 20px; font-weight: 600; color: #b23b5e; margin-bottom: 10px; }
        input, select { font-size: 20px; padding: 16px 20px; border-radius: 50px; border: 2px solid #ffb7c5; background: white; width: 90%; max-width: 280px; text-align: center; }
        .btn-primary { background: #ff80a5; color: white; font-size: 24px; padding: 16px 35px; border: none; border-radius: 60px; cursor: pointer; margin-top: 15px; }
        .result-card { background: #fff2f5; border-radius: 40px; padding: 25px; }
        .result-text { background: #ffe0e8; border-radius: 50px; padding: 20px; margin: 20px 0; font-size: 22px; font-weight: 600; color: #c43a6b; }
        .btn-copy { background: #ff6699; color: white; font-size: 22px; padding: 16px 25px; border: none; border-radius: 60px; cursor: pointer; width: 100%; max-width: 280px; }
        .btn-secondary { background: #ff99bb; color: white; font-size: 18px; padding: 12px 25px; border: none; border-radius: 60px; cursor: pointer; margin-top: 10px; }
        .link-btn { background: none; border: none; color: #c43a6b; font-size: 18px; text-decoration: underline; padding: 12px; cursor: pointer; }
        .big-heart { font-size: 65px; animation: pulse 1.2s infinite; display: inline-block; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
<div class="card">
    <div id="page1" class="page active">
        <div class="hearts">❤️ 💖 ❤️</div>
        <h1>Ты согласна пойти со мной на свидание?</h1>
        <div class="button-group">
            <button class="btn btn-yes" id="yesBtn">💘 ДА 💘</button>
            <button class="btn btn-no" id="noBtn">😅 НЕТ</button>
        </div>
    </div>
    <div id="page2" class="page">
        <div class="hearts">🌸 📅 🌸</div>
        <h2>Выбери день и время</h2>
        <div class="picker-area">
            <div class="picker-row"><label>📆 ДАТА</label><input type="date" id="datePicker"></div>
            <div class="picker-row"><label>⏰ ВРЕМЯ</label>
                <select id="timePicker">
                    <option>10:00</option><option>11:30</option><option>13:00</option>
                    <option>15:00</option><option>17:30</option><option selected>19:00</option><option>20:30</option>
                </select>
            </div>
            <button class="btn-primary" id="submitBtn">✨ Назначить встречу ✨</button>
        </div>
        <button class="link-btn" id="backBtn">← Назад</button>
    </div>
    <div id="page3" class="page">
        <div class="big-heart">💖💌💖</div>
        <h2>Ура! Жду с нетерпением!</h2>
        <div class="result-card">
            <div class="result-text" id="resultText"></div>
            <button class="btn-copy" id="copyBtn">📋 Скопировать дату</button>
            <p style="color:#a85a74; margin-top:12px; font-size:14px;">Нажми → вставь в чат со мной 💕</p>
        </div>
        <button class="btn-secondary" id="resetBtn">🏠 Начать заново</button>
    </div>
</div>
<script>
    const noBtn = document.getElementById('noBtn');
    let noBtnEnabled = true;
    function makeNoBtnEscape() {
        if(!noBtnEnabled) return;
        const parent = noBtn.parentElement;
        const pr = parent.getBoundingClientRect(), br = noBtn.getBoundingClientRect();
        const maxX = Math.max(20, pr.width - br.width - 20);
        const maxY = Math.max(20, pr.height - br.height - 20);
        noBtn.style.position = 'relative';
        noBtn.style.left = Math.random() * maxX + 'px';
        noBtn.style.top = Math.random() * maxY + 'px';
    }
    noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); makeNoBtnEscape(); });
    noBtn.addEventListener('mouseenter', makeNoBtnEscape);
    noBtn.onclick = (e) => { e.preventDefault(); makeNoBtnEscape(); };
    
    const p1=document.getElementById('page1'), p2=document.getElementById('page2'), p3=document.getElementById('page3');
    function showPage(n){
        p1.classList.remove('active'); p2.classList.remove('active'); p3.classList.remove('active');
        if(n===1) p1.classList.add('active');
        if(n===2) p2.classList.add('active');
        if(n===3) p3.classList.add('active');
        noBtnEnabled = (n===1);
        if(n!==1) { noBtn.style.position = ''; noBtn.style.left = ''; noBtn.style.top = ''; }
    }
    const dp = document.getElementById('datePicker');
    const today = new Date();
    dp.min = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    dp.value = dp.min;
    let savedTime='', savedDate='';
    document.getElementById('yesBtn').onclick = () => showPage(2);
    document.getElementById('backBtn').onclick = () => showPage(1);
    document.getElementById('resetBtn').onclick = () => showPage(1);
    document.getElementById('submitBtn').onclick = () => {
        const date = dp.value;
        const time = document.getElementById('timePicker').value;
        const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
        const [y,m,d] = date.split('-');
        const fmt = `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
        savedTime = time; savedDate = fmt;
        document.getElementById('resultText').innerHTML = `Встречаемся в ${time}, ${fmt} ❤️`;
        showPage(3);
    };
    document.getElementById('copyBtn').onclick = async () => {
        const text = `💕 Встречаемся на свидание ${savedTime}, ${savedDate} 💕`;
        await navigator.clipboard.writeText(text);
        alert('✅ Скопировано! Теперь отправь мне в чат 💕');
    };
</script>
</body>
</html>
